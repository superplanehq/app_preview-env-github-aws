          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 120
        "y": 1920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "delete-droplet-close"
      name: "Delete Instance (Close)"
      type: "TYPE_ACTION"
      component: "aws.ec2.deleteInstance"
      configuration:
        instance: "{{ $['Read Env (Close)'].data.values[0].instance_id }}"
        region: "us-east-1"
      metadata:
