        namespace: "preview-envs"
      position:
        x: 2040
        "y": 2560
      isCollapsed: false
      paused: false
    - id: "ack-destroy"
      name: "Ack Destroy"
      type: "TYPE_ACTION"
      component: "github.addReaction"
      configuration:
        commentId: "{{ root().data.comment.id }}"
