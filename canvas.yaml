        repository: "example-app"
        state: "inactive"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 2680
        "y": 3020
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "delete-droplet-cmd"
      name: "Delete Instance"
      type: "TYPE_ACTION"
      component: "aws.ec2.deleteInstance"
      configuration:
        instance: "{{ $['Read Env'].data.values[0].instance_id }}"
        region: "us-east-1"
      metadata:
        instanceName: "{{ $['Read Env'].data.values[0].instance_id }}"
        region: "us-east-1"
      position:
        x: 2040
        "y": 1740
      isCollapsed: false
      integration:
        id: "29467c4b-763b-4ba0-acf6-dec213ae6277"
      paused: false
    - id: "save-env"
      name: "Save Environment"
      type: "TYPE_ACTION"
      component: "upsertMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
        namespace: "preview-envs"
        valueList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
          - name: "instance_id"
            value: "{{ $['Create Instance'].data.instanceId }}"
          - name: "url"
            value: "http://{{ $['Create Instance'].data.publicIpAddress }}.sslip.io"
          - name: "created_at"
            value: "{{ string(int(now().Unix())) }}"
          - name: "repo"
            value: "example-app"
          - name: "deployment_id"
            value: "{{ string(int($['Create Deployment'].data.id)) }}"
          - name: "requested_by"
            value: "{{ root().data.comment.user.login }}"
          - name: "instance_url"
            value: "https://eu-central-1.console.aws.amazon.com/ec2/home?region=eu-central-1#Instances:instanceId={{ $['Create Instance'].data.InstanceId }}"
          - name: "pr_title"
            value: "{{ root().data.issue.title }}"
          - name: "pr_url"
            value: "{{ root().data.issue.html_url }}"
      position:
        x: 4600
        "y": 740
      isCollapsed: false
      paused: false
    - id: "cleanup-failed-droplet"
      name: "Cleanup Failed Instance"
      type: "TYPE_ACTION"
      component: "aws.ec2.deleteInstance"
      configuration:
        instance: "{{ $['Create Instance'].data.instanceId }}"
        region: "us-east-1"
      metadata:
