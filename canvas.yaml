        allowHttpsFromInternet: true
        allowSshFromInternet: true
        associatePublicIpAddress: true
        image: "ami-02fd066b86800f60c"
        imageOs: "ubuntu"
        instanceType: "t3.micro"
        keyName: "preview-aws-ssh-key"
