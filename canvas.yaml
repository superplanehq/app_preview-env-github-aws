apiVersion: "v1"
kind: "Canvas"
metadata:
  id: "fc774886-da6c-4dae-b171-6aa5f7631fe2"
  name: "Preview Environments AWS"
  description: ""
  isTemplate: false
spec:
  nodes:
    - id: "setup-failed-comment"
      name: "Setup Failed"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment setup failed. The instance has been cleaned up automatically.\n\nPlease try again with `/start`. If the problem persists, check the setup script at `scripts/preview-setup.sh`.\n"
        issueNumber: "{{ root().data.issue.number }}"
        repository: "example-app"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 5240
        "y": 1100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "ttl-expired-comment"
      name: "TTL Expired Comment"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment for this PR has been automatically destroyed after 24 hours. Use `/start` to spin up a new one."
        issueNumber: "{{ $['Read All Envs'].data.values[0].pr_number }}"
        repository: "example-app"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 3960
        "y": 3020
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "ttl-cleanup"
      name: "TTL Cleanup"
      type: "TYPE_ACTION"
      component: "deleteMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ $['Read All Envs'].data.values[0].pr_number }}"
        namespace: "preview-envs"
      position:
        x: 3320
        "y": 3020
      isCollapsed: false
      paused: false
    - id: "read-all-envs"
      name: "Read All Envs"
      type: "TYPE_ACTION"
      component: "readMemory"
      configuration:
        emitMode: "oneByOne"
        matchList:
          - name: "repo"
            value: "example-app"
        namespace: "preview-envs"
        resultMode: "all"
      position:
        x: 760
        "y": 3020
      isCollapsed: false
      paused: false
    - id: "deploy-status-progress"
      name: "Status: In Progress"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ string(int($['Create Deployment'].data.id)) }}"
        repository: "example-app"
        state: "in_progress"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 2680
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "create-deployment"
      name: "Create Deployment"
      type: "TYPE_ACTION"
      component: "github.createDeployment"
      configuration:
        autoMerge: false
        environment: "preview-pr-{{ root().data.issue.number }}"
        ref: "refs/pull/{{ root().data.issue.number }}/head"
        repository: "example-app"
        requiredContexts: []
        transientEnvironment: true
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 2040
        "y": 740
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "setup-app"
      name: "Setup App"
      type: "TYPE_ACTION"
      component: "ssh"
      configuration:
        authentication:
          authMethod: "ssh_key"
          privateKey:
            key: "private-key"
            secret: "preview-aws-ssh-key"
        commands: "curl -fsSL https://raw.githubusercontent.com/example/example/main/scripts/preview-setup.sh -o /tmp/setup.sh && chmod +x /tmp/setup.sh && sudo PR_NUMBER={{ root().data.issue.number }} bash /tmp/setup.sh"
        connectionRetry:
          enabled: true
          intervalSeconds: 15
          retries: 10
        host: "{{ $['Create Instance'].data.publicIpAddress }}"
        port: 22
        timeout: 300
        username: "ubuntu"
      position:
        x: 3960
        "y": 920
      isCollapsed: false
      paused: false
    - id: "health-failed-comment"
      name: "Health Check Warning"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment deployed but the health check did not pass. The app may still be starting up.\n\n**URL:** http://{{ $['Create Instance'].data.publicIpAddress }}.sslip.io\n\nUse `/destroy` then `/start` to retry if it does not come up.\n"
        issueNumber: "{{ root().data.issue.number }}"
        repository: "example-app"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 5880
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "comment-ready"
      name: "Post Preview URL"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Your preview environment is ready!\n\n**URL:** http://{{ $['Create Instance'].data.publicIpAddress }}.sslip.io\n\nThis environment will be automatically destroyed after 24 hours. Use `/destroy` to tear it down manually.\n"
        issueNumber: "{{ root().data.issue.number }}"
        repository: "example-app"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 6520
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "cleanup-cmd"
      name: "Cleanup Memory"
      type: "TYPE_ACTION"
      component: "deleteMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
        namespace: "preview-envs"
      position:
        x: 2680
        "y": 1920
      isCollapsed: false
      paused: false
    - id: "already-exists"
      name: "Already Running"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "A preview environment is already running for this PR. Use `/destroy` to tear it down first."
        issueNumber: "{{ root().data.issue.number }}"
        repository: "example-app"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 2040
        "y": 1100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "deploy-status-failure"
