apiVersion: "v1"
kind: "Canvas"
metadata:
  id: "fc774886-da6c-4dae-b171-6aa5f7631fe2"
  name: "Preview Environments AWS"
  description: Spin up preview environments on AWS EC2 for GitHub pull requests
spec:
  nodes:
    - id: "setup-failed-comment"
      name: "Setup Failed"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment setup failed. The instance has been cleaned up automatically.\n\nPlease try again with `/start`. If the problem persists, check the setup script at `scripts/preview-setup.sh`.\n"
        issueNumber: "{{ root().data.issue.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 5240
        "y": 1100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "ttl-expired-comment"
      name: "TTL Expired Comment"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment for this PR has been automatically destroyed after 24 hours. Use `/start` to spin up a new one."
        issueNumber: "{{ $['Read All Envs'].data.values[0].pr_number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 3960
        "y": 3020
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "ttl-cleanup"
      name: "TTL Cleanup"
      type: "TYPE_ACTION"
      component: "deleteMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ $['Read All Envs'].data.values[0].pr_number }}"
        namespace: "preview-envs"
      position:
        x: 3320
        "y": 3020
      isCollapsed: false
    - id: "read-all-envs"
      name: "Read All Envs"
      type: "TYPE_ACTION"
      component: "readMemory"
      configuration:
        emitMode: "oneByOne"
        matchList:
          - name: "repo"
            value: {{ install_params.repository }}
        namespace: "preview-envs"
        resultMode: "all"
      position:
        x: 760
        "y": 3020
      isCollapsed: false
    - id: "deploy-status-progress"
      name: "Status: In Progress"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ string(int($['Create Deployment'].data.id)) }}"
        repository: {{ install_params.repository }}
        state: "in_progress"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 2680
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "create-deployment"
      name: "Create Deployment"
      type: "TYPE_ACTION"
      component: "github.createDeployment"
      configuration:
        autoMerge: false
        environment: "preview-pr-{{ root().data.issue.number }}"
        ref: "refs/pull/{{ root().data.issue.number }}/head"
        repository: {{ install_params.repository }}
        requiredContexts: []
        transientEnvironment: true
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 2040
        "y": 740
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "setup-app"
      name: "Setup App"
      type: "TYPE_ACTION"
      component: "ssh"
      configuration:
        authentication:
          authMethod: "ssh_key"
          privateKey:
            key: "private-key"
            secret: {{ install_params.ssh_secret }}
        commandSource: file
        commandFile: scripts/preview-setup.sh
        environment:
          - name: PR_NUMBER
            value: '{{ root().data.issue.number }}'
          - name: REPO_URL
            value: '{{ root().data.repository.clone_url }}'
        connectionRetry:
          enabled: true
          intervalSeconds: 15
          retries: 10
        host: "{{ $['Create Instance'].data.publicIpAddress }}"
        port: 22
        timeout: 300
        username: "ubuntu"
      position:
        x: 3960
        "y": 920
      isCollapsed: false
    - id: "health-failed-comment"
      name: "Health Check Warning"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment deployed but the health check did not pass. The app may still be starting up.\n\n**URL:** http://{{ $['Create Instance'].data.publicIpAddress }}.sslip.io\n\nUse `/destroy` then `/start` to retry if it does not come up.\n"
        issueNumber: "{{ root().data.issue.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 5880
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "comment-ready"
      name: "Post Preview URL"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Your preview environment is ready!\n\n**URL:** http://{{ $['Create Instance'].data.publicIpAddress }}.sslip.io\n\nThis environment will be automatically destroyed after 24 hours. Use `/destroy` to tear it down manually.\n"
        issueNumber: "{{ root().data.issue.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 6520
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "cleanup-cmd"
      name: "Cleanup Memory"
      type: "TYPE_ACTION"
      component: "deleteMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
        namespace: "preview-envs"
      position:
        x: 2680
        "y": 1920
      isCollapsed: false
    - id: "already-exists"
      name: "Already Running"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "A preview environment is already running for this PR. Use `/destroy` to tear it down first."
        issueNumber: "{{ root().data.issue.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 2040
        "y": 1100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "deploy-status-failure"
      name: "Status: Failure"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ string(int($['Create Deployment'].data.id)) }}"
        repository: {{ install_params.repository }}
        state: "failure"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 4600
        "y": 1100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "comment-destroyed-cmd"
      name: "Destroyed Comment"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment destroyed. Use `/start` to spin up a new one."
        issueNumber: "{{ root().data.issue.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 3960
        "y": 1920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "deploy-status-inactive-close"
      name: "Status: Inactive (Close)"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ $['Read Env (Close)'].data.values[0].deployment_id }}"
        repository: {{ install_params.repository }}
        state: "inactive"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 2680
        "y": 2560
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "ack-deploy"
      name: "Ack Deploy"
      type: "TYPE_ACTION"
      component: "github.addReaction"
      configuration:
        commentId: "{{ root().data.comment.id }}"
        content: "eyes"
        repository: {{ install_params.repository }}
        target: "issueComment"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 760
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "read-env-close"
      name: "Read Env (Close)"
      type: "TYPE_ACTION"
      component: "readMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.pull_request.number }}"
        namespace: "preview-envs"
        resultMode: "latest"
      position:
        x: 760
        "y": 2560
      isCollapsed: false
    - id: "check-exists"
      name: "Check Exists"
      type: "TYPE_ACTION"
      component: "readMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
        namespace: "preview-envs"
        resultMode: "latest"
      position:
        x: 1400
        "y": 920
      isCollapsed: false
    - id: "deploy-status-success"
      name: "Status: Success"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ string(int($['Create Deployment'].data.id)) }}"
        environmentUrl: "http://{{ $['Create Instance'].data.PublicIpAddress }}.sslip.io"
        repository: {{ install_params.repository }}
        state: "success"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 5880
        "y": 560
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "read-env-destroy"
      name: "Read Env"
      type: "TYPE_ACTION"
      component: "readMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
        namespace: "preview-envs"
        resultMode: "latest"
      position:
        x: 1400
        "y": 1920
      isCollapsed: false
    - id: "comment-destroyed-close"
      name: "Destroyed Comment (Close)"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "PR closed — preview environment has been automatically destroyed."
        issueNumber: "{{ root().data.pull_request.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 3320
        "y": 2560
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "ttl-deploy-status-inactive"
      name: "Status: Inactive (TTL)"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ $['Read All Envs'].data.values[0].deployment_id }}"
        repository: {{ install_params.repository }}
        state: "inactive"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 2680
        "y": 3020
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "delete-droplet-cmd"
      name: "Delete Instance"
      type: "TYPE_ACTION"
      component: "aws.ec2.deleteInstance"
      configuration:
        instance: "{{ $['Read Env'].data.values[0].instance_id }}"
        region: "us-east-1"
      metadata:
        instanceName: "{{ $['Read Env'].data.values[0].instance_id }}"
        region: "us-east-1"
      position:
        x: 2040
        "y": 1740
      isCollapsed: false
      integration:
        id: "29467c4b-763b-4ba0-acf6-dec213ae6277"
    - id: "save-env"
      name: "Save Environment"
      type: "TYPE_ACTION"
      component: "upsertMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
        namespace: "preview-envs"
        valueList:
          - name: "pr_number"
            value: "{{ root().data.issue.number }}"
          - name: "instance_id"
            value: "{{ $['Create Instance'].data.instanceId }}"
          - name: "url"
            value: "http://{{ $['Create Instance'].data.publicIpAddress }}.sslip.io"
          - name: "created_at"
            value: "{{ string(int(now().Unix())) }}"
          - name: "repo"
            value: {{ install_params.repository }}
          - name: "deployment_id"
            value: "{{ string(int($['Create Deployment'].data.id)) }}"
          - name: "requested_by"
            value: "{{ root().data.comment.user.login }}"
          - name: "instance_url"
            value: "https://eu-central-1.console.aws.amazon.com/ec2/home?region=eu-central-1#Instances:instanceId={{ $['Create Instance'].data.InstanceId }}"
          - name: "pr_title"
            value: "{{ root().data.issue.title }}"
          - name: "pr_url"
            value: "{{ root().data.issue.html_url }}"
      position:
        x: 4600
        "y": 740
      isCollapsed: false
    - id: "cleanup-failed-droplet"
      name: "Cleanup Failed Instance"
      type: "TYPE_ACTION"
      component: "aws.ec2.deleteInstance"
      configuration:
        instance: "{{ $['Create Instance'].data.instanceId }}"
        region: "us-east-1"
      metadata:
        instanceName: "{{ $['Create Instance'].data.instanceId }}"
        region: "us-east-1"
      position:
        x: 5880
        "y": 1280
      isCollapsed: false
      integration:
        id: "29467c4b-763b-4ba0-acf6-dec213ae6277"
    - id: "pr-opened"
      name: "PR Opened"
      type: "TYPE_TRIGGER"
      component: "github.onPullRequest"
      configuration:
        actions:
          - "opened"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 120
        "y": 100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "check-ttl"
      name: "Older than 24h?"
      type: "TYPE_ACTION"
      component: "if"
      configuration:
        expression: "{{ int(now().Unix()) - int(previous().data.values[0].created_at) > 86400 }}"
      position:
        x: 1400
        "y": 3020
      isCollapsed: false
    - id: "cleanup-close"
      name: "Cleanup Memory (Close)"
      type: "TYPE_ACTION"
      component: "deleteMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.pull_request.number }}"
        namespace: "preview-envs"
      position:
        x: 2040
        "y": 2560
      isCollapsed: false
    - id: "ack-destroy"
      name: "Ack Destroy"
      type: "TYPE_ACTION"
      component: "github.addReaction"
      configuration:
        commentId: "{{ root().data.comment.id }}"
        content: "eyes"
        repository: {{ install_params.repository }}
        target: "issueComment"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 760
        "y": 1920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "destroy-cmd"
      name: "/destroy"
      type: "TYPE_TRIGGER"
      component: "github.onPRComment"
      configuration:
        contentFilter: "^/destroy"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 120
        "y": 1920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "delete-droplet-close"
      name: "Delete Instance (Close)"
      type: "TYPE_ACTION"
      component: "aws.ec2.deleteInstance"
      configuration:
        instance: "{{ $['Read Env (Close)'].data.values[0].instance_id }}"
        region: "us-east-1"
      metadata:
        instanceName: "{{ $['Read Env (Close)'].data.values[0].instance_id }}"
        region: "us-east-1"
      position:
        x: 1400
        "y": 2560
      isCollapsed: false
      integration:
        id: "29467c4b-763b-4ba0-acf6-dec213ae6277"
    - id: "ttl-schedule"
      name: "TTL Check"
      type: "TYPE_TRIGGER"
      component: "schedule"
      configuration:
        hoursInterval: 1
        timezone: "0"
        type: "hours"
      metadata:
        nextTrigger: "2026-05-25T16:00:00Z"
        referenceTime: null
      position:
        x: 120
        "y": 3020
      isCollapsed: false
    - id: "deploy-status-inactive-cmd"
      name: "Status: Inactive"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ $['Read Env'].data.values[0].deployment_id }}"
        repository: {{ install_params.repository }}
        state: "inactive"
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 3320
        "y": 1920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "deploy-cmd"
      name: "/start"
      type: "TYPE_TRIGGER"
      component: "github.onPRComment"
      configuration:
        contentFilter: "^/start"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 120
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "http-health-check"
      name: "Health Check"
      type: "TYPE_ACTION"
      component: "http"
      configuration:
        method: "GET"
        retry:
          enabled: false
        timeoutSeconds: 5
        url: "http://{{ $['Create Instance'].data.publicIpAddress }}.sslip.io"
      position:
        x: 5240
        "y": 740
      isCollapsed: false
    - id: "welcome-comment"
      name: "Welcome Comment"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Welcome! Comment `/start` on this PR to spin up a preview environment. Use `/destroy` to tear it down when you're done.\n"
        issueNumber: "{{ root().data.pull_request.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 760
        "y": 100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "create-droplet"
      name: "Create Instance"
      type: "TYPE_ACTION"
      component: "aws.ec2.createInstance"
      configuration:
        allowHttpFromInternet: true
        allowHttpsFromInternet: true
        allowSshFromInternet: true
        associatePublicIpAddress: true
        image: "ami-02fd066b86800f60c"
        imageOs: "ubuntu"
        instanceType: "t3.micro"
        keyName: {{ install_params.ec2_key_name }}
        name: "preview-pr-{{ root().data.issue.number }}"
        region: "us-east-1"
        securityGroupMode: "create"
        subnet: "subnet-0fe49d94faf9cac72"
      metadata:
        image: "ami-02fd066b86800f60c"
        imageName: "ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20260521"
        imageOs: "ubuntu"
        imageOsLabel: "Ubuntu"
        instanceType: "t3.micro"
        name: "preview-pr-{{ root().data.issue.number }}"
        region: "us-east-1"
        securityGroupMode: "create"
        subnet: "subnet-0fe49d94faf9cac72"
        subnetName: "superplane-public-us-east-1a (subnet-0fe49d94faf9cac72)"
      position:
        x: 3320
        "y": 920
      isCollapsed: false
      integration:
        id: "29467c4b-763b-4ba0-acf6-dec213ae6277"
    - id: "no-env-destroy"
      name: "No Env Found"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "No active preview environment found for this PR."
        issueNumber: "{{ root().data.issue.number }}"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 2040
        "y": 2100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "pr-closed"
      name: "PR Closed"
      type: "TYPE_TRIGGER"
      component: "github.onPullRequest"
      configuration:
        actions:
          - "closed"
        repository: {{ install_params.repository }}
      metadata:
        repository:
          id: 1234567890
          name: {{ install_params.repository }}
          url: ""
      position:
        x: 120
        "y": 2560
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
    - id: "ttl-delete-droplet"
      name: "TTL Delete Instance"
      type: "TYPE_ACTION"
      component: "aws.ec2.deleteInstance"
      configuration:
        instance: "{{ $['Read All Envs'].data.values[0].instance_id }}"
        region: "us-east-1"
      metadata:
        instanceName: "{{ $['Read All Envs'].data.values[0].instance_id }}"
        region: "us-east-1"
      position:
        x: 2040
        "y": 3020
      isCollapsed: false
      integration:
        id: "29467c4b-763b-4ba0-acf6-dec213ae6277"
    - component: annotation
      configuration:
        color: purple
        height: 328
        text: |
          ## Setting up your app
    
          This SSH node runs `scripts/preview-setup.sh` from the **Files** tab to install and start your application on the instance.
    
          ### What's configured at install
    
          - **SSH secret** — the private key for connecting to instances
          - **EC2 key pair** — the AWS key pair injected into new instances (must match the secret)
    
          ### You will need to update this
    
          This app handles the full lifecycle of preview environments — provisioning, health checks, teardown, and cleanup. But the actual setup step depends on your application. Edit `scripts/preview-setup.sh` in the **Files** tab to install your dependencies, build your app, and start your services.
        width: 600
      id: annotation-setup-note
      name: Note
      position:
        x: 3840
        'y': 456
      type: TYPE_WIDGET
  edges:
    - sourceId: "ack-deploy"
      targetId: "check-exists"
      channel: "default"
    - sourceId: "ack-destroy"
      targetId: "read-env-destroy"
      channel: "default"
    - sourceId: "check-exists"
      targetId: "already-exists"
      channel: "found"
    - sourceId: "check-exists"
      targetId: "create-deployment"
      channel: "notFound"
    - sourceId: "check-ttl"
      targetId: "ttl-delete-droplet"
      channel: "true"
