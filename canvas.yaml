      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ string(int($['Create Deployment'].data.id)) }}"
        repository: "example-app"
        state: "failure"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 4600
        "y": 1100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "comment-destroyed-cmd"
      name: "Destroyed Comment"
      type: "TYPE_ACTION"
      component: "github.createIssueComment"
      configuration:
        body: "Preview environment destroyed. Use `/start` to spin up a new one."
        issueNumber: "{{ root().data.issue.number }}"
        repository: "example-app"
