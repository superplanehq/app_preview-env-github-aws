        namespace: "preview-envs"
        resultMode: "latest"
      position:
        x: 1400
        "y": 920
      isCollapsed: false
      paused: false
    - id: "deploy-status-success"
      name: "Status: Success"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ string(int($['Create Deployment'].data.id)) }}"
        environmentUrl: "http://{{ $['Create Instance'].data.PublicIpAddress }}.sslip.io"
        repository: "example-app"
        state: "success"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 5880
        "y": 560
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "read-env-destroy"
