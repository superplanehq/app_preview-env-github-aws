        region: "us-east-1"
      position:
        x: 5880
        "y": 1280
      isCollapsed: false
      integration:
        id: "29467c4b-763b-4ba0-acf6-dec213ae6277"
      paused: false
    - id: "pr-opened"
      name: "PR Opened"
      type: "TYPE_TRIGGER"
      component: "github.onPullRequest"
      configuration:
        actions:
          - "opened"
        repository: "example-app"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 120
        "y": 100
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "check-ttl"
      name: "Older than 24h?"
      type: "TYPE_ACTION"
      component: "if"
      configuration:
        expression: "{{ int(now().Unix()) - int(previous().data.values[0].created_at) > 86400 }}"
      position:
        x: 1400
        "y": 3020
      isCollapsed: false
      paused: false
    - id: "cleanup-close"
      name: "Cleanup Memory (Close)"
      type: "TYPE_ACTION"
      component: "deleteMemory"
      configuration:
        matchList:
          - name: "pr_number"
