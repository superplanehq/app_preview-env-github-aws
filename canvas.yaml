        imageOs: "ubuntu"
        imageOsLabel: "Ubuntu"
        instanceType: "t3.micro"
        name: "preview-pr-{{ root().data.issue.number }}"
        region: "us-east-1"
        securityGroupMode: "create"
        subnet: "subnet-0fe49d94faf9cac72"
