      configuration:
        hoursInterval: 1
        timezone: "0"
        type: "hours"
      metadata:
        nextTrigger: "2026-05-25T16:00:00Z"
        referenceTime: null
      position:
        x: 120
        "y": 3020
      isCollapsed: false
      paused: false
    - id: "deploy-status-inactive-cmd"
