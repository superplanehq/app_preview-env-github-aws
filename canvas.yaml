          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 3960
        "y": 1920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "deploy-status-inactive-close"
      name: "Status: Inactive (Close)"
      type: "TYPE_ACTION"
      component: "github.createDeploymentStatus"
      configuration:
        deploymentId: "{{ $['Read Env (Close)'].data.values[0].deployment_id }}"
        repository: "example-app"
        state: "inactive"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 2680
        "y": 2560
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "ack-deploy"
      name: "Ack Deploy"
      type: "TYPE_ACTION"
      component: "github.addReaction"
      configuration:
        commentId: "{{ root().data.comment.id }}"
        content: "eyes"
        repository: "example-app"
        target: "issueComment"
      metadata:
        repository:
          id: 1234567890
          name: "example-app"
          url: "https://github.com/example/example"
      position:
        x: 760
        "y": 920
      isCollapsed: false
      integration:
        id: "51a76317-1481-467b-b761-3bb11af1851e"
      paused: false
    - id: "read-env-close"
      name: "Read Env (Close)"
      type: "TYPE_ACTION"
      component: "readMemory"
      configuration:
        matchList:
          - name: "pr_number"
            value: "{{ root().data.pull_request.number }}"
        namespace: "preview-envs"
        resultMode: "latest"
      position:
        x: 760
        "y": 2560
      isCollapsed: false
      paused: false
    - id: "check-exists"
      name: "Check Exists"
      type: "TYPE_ACTION"
      component: "readMemory"
      configuration:
        matchList:
          - name: "pr_number"
